<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

    <nav>
        <a href="#">
            <img src="1.jpg" alt="Logo">
        </a>

        <div class="Navlinks">
            <a href="Home.html">Home</a>
            <a href="#">Register</a>
            <a href="Login.html">Login</a>
    </nav>

    <p>Enter your details as required:</p>

    <form action="Register.php" method="post">
        <div class="field">
            <label for="fullname">Full Names</label>
            <input type="text" id="fullname" name="fullname" required>
        </div>

        <div class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="field">
            <label for="networktype">Network Type</label>
            <input type="text" id="networktype" name="networktype" required>
        </div>

        <div class="field">
            <label for="ip">IP Address</label>
            <input type="text" id="ip" name="ip" placeholder="192.168.1.1">
        </div>

        <div class="field">
            <label for="gender">Gender</label>
            <select id="gender" name="gender" required>
                <option value="">Select</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div class="field">
            <label for="confirmpassword">Confirm password</label>
            <input type="password" id="confirmpassword" name="confirmpassword" required>
        </div>

        <div class="submit">
            <button type="submit">Register</button>
        </div>

        <div class="textlink">
            <p>
                If you already have an account, click
                <a href="Login.html">HERE</a>
                to login.
            </p>
        </div>

    </form>

</body>
</html>
